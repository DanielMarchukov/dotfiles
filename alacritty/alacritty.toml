# Alacritty configuration — kept as a backup terminal, aligned with the WezTerm
# setup: 0xProto Nerd Font Mono + Catppuccin Mocha, launching straight into WSL
# on Windows. Deployed to %APPDATA%\alacritty\alacritty.toml by bootstrap (under
# WSL). tmux handles multiplexing, so window chrome is kept minimal.

[window]
padding = { x = 4, y = 2 }
dynamic_title = true
# tmux owns session UI; keep the host window borderless and match WezTerm's
# previous 90% background opacity.
decorations = "None"
opacity = 0.90

[scrolling]
history = 10000

[font]
size = 11.0

[font.normal]
family = "0xProto Nerd Font Mono"
style = "Regular"

[font.bold]
family = "0xProto Nerd Font Mono"
style = "Bold"

[font.italic]
family = "0xProto Nerd Font Mono"
style = "Italic"

# 0xProto Nerd Font Mono ships no Bold-Italic face; Alacritty synthesizes it,
# so bold_italic is intentionally left unset (referencing a missing style warns).

[terminal.shell]
program = "wsl.exe"
args = ["~"]

# --- Catppuccin Mocha (matches Neovim, tmux, and WezTerm) -------------------
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#f5e0dc"
